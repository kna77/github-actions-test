<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自己紹介ページ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=3" />
  </head>
  <body>
    <main class="profile-card">
      <p class="eyebrow">GitHub Actions 練習用プロジェクト</p>
      <h1>こんにちは、川島太郎です</h1>
      <p class="lead">
        Web制作と自動化が好きなフロントエンド学習者です。シンプルで読みやすい
        UI を心がけています。
      </p>

      <section class="highlights" aria-label="注目ポイント">
        <article class="highlight">
          <p class="highlight-label">Focus</p>
          <h2>GitHub Actions</h2>
          <p>push からテストとデプロイまでを自動化する練習をしています。</p>
        </article>
        <article class="highlight">
          <p class="highlight-label">Now</p>
          <h2>UI の調整</h2>
          <p>色、余白、見出しの強弱を整えて、見やすい画面を作っています。</p>
        </article>
        <article class="highlight">
          <p class="highlight-label">Goal</p>
          <h2>実践力</h2>
          <p>テストと公開の流れを体験しながら、運用の感覚を身につけます。</p>
        </article>
        <article class="highlight highlight-alert">
          <p class="highlight-label">Alert</p>
          <h2>赤い強調</h2>
          <p>このカードだけ赤文字にして、変化が分かるようにしました。</p>
        </article>
      </section>
    </main>
  </body>
</html>
